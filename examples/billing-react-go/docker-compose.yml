# Used for E2E (Playwright) and ad-hoc manual testing.
# Local dev workflow doesn't need this — use go run + pnpm dev.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: billing
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d billing"]
      interval: 2s
      timeout: 3s
      retries: 10

  migrate:
    image: migrate/migrate:v4.18.1
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./api/migrations:/migrations
    command:
      - "-path=/migrations"
      - "-database=postgres://test:test@postgres:5432/billing?sslmode=disable"
      - "up"

  api:
    build: ./api
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://test:test@postgres:5432/billing?sslmode=disable
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 2s
      timeout: 3s
      retries: 10

  frontend:
    build: ./frontend
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "5173:5173"
